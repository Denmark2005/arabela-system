{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verify Your Email | Arabela</title>
    <link rel="icon" type="image/svg+xml" href="{% static 'arabela_admin/images/logo/favicon-arabela.svg' %}" />
    <link href="{% static 'arabela_admin/style.css' %}" rel="stylesheet" />
  </head>
  <body class="min-h-screen bg-[#F9F9F9] flex items-center justify-center px-6">
    <main class="w-full max-w-md rounded-xl border border-gray-200 bg-white p-8 shadow-sm">
      <h1 class="text-2xl font-semibold text-gray-900">✉️ Verify Your Email</h1>

      {% if resent %}
      <p class="mt-4 text-sm text-emerald-700">A new verification email was sent.</p>
      {% endif %}

      <p class="mt-5 text-sm text-gray-600">We sent a verification link to:</p>
      <p class="mt-1 text-base font-semibold text-gray-900 break-all">{{ email }}</p>

      <p class="mt-5 text-sm text-gray-600">
        Please check your inbox and click the link to activate your account.
      </p>

      <div class="my-6 h-px w-full bg-gray-200"></div>

      <form method="post" action="{% url 'accounts:resend_verification_email' %}">
        {% csrf_token %}
        <input type="hidden" name="email" value="{{ email }}" />
        <button
          type="submit"
          class="w-full rounded-lg border border-gray-300 px-4 py-3 text-sm font-semibold text-gray-800 hover:bg-gray-50 transition-colors"
        >
          Didn't receive it? Resend Email
        </button>
      </form>

      <div class="my-6 h-px w-full bg-gray-200"></div>

      <a
        href="{% url 'accounts:login' %}"
        class="block w-full rounded-lg bg-black px-4 py-3 text-center text-sm font-semibold text-white hover:bg-slate-900 transition-colors"
      >
        Already verified? Sign In
      </a>
    </main>
  </body>
</html>
